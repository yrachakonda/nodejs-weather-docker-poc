[SERVICE]
    Flush 1
    Daemon Off
    Log_Level info

[INPUT]
    Name tail
    Path /var/log/containers/*api*.log
    Parser docker
    Tag weather.api

[OUTPUT]
    Name cloudwatch_logs
    Match weather.*
    region ${AWS_REGION}
    log_group_name ${CLOUDWATCH_LOG_GROUP}
    log_stream_prefix fluent-bit-
    auto_create_group true
