[SERVICE]
    Flush 1
    Daemon Off
    Log_Level info
    Parsers_File /fluent-bit/etc/parsers.conf
    HTTP_Server On
    HTTP_Listen 0.0.0.0
    HTTP_Port 2020

[INPUT]
    Name tail
    Path /var/log/containers/*.log
    multiline.parser docker, cri
    Tag kube.*
    Mem_Buf_Limit 50MB
    Skip_Long_Lines On

[FILTER]
    Name kubernetes
    Match kube.*
    Kube_Tag_Prefix kube.var.log.containers.
    Merge_Log On
    Keep_Log Off
    K8S-Logging.Parser On
    K8S-Logging.Exclude Off

[FILTER]
    Name grep
    Match kube.*
    Regex $kubernetes['namespace_name'] ^${APP_NAMESPACE}$

[FILTER]
    Name modify
    Match kube.*
    Add cluster_name ${CLUSTER_NAME}

[OUTPUT]
    Name kafka
    Match kube.*
    Brokers ${KAFKA_BOOTSTRAP_SERVERS}
    Topics ${KAFKA_TOPIC}
    Format json
    Retry_Limit False
    rdkafka.request.required.acks 1
