apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fluent-bit.fullname" . }}
  labels:
    {{- include "fluent-bit.labels" . | nindent 4 }}
data:
  parsers.conf: |
    [PARSER]
        Name docker
        Format json
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep On
        Decode_Field_As escaped_utf8 log

    [PARSER]
        Name cri
        Format regex
        Regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep On

  fluent-bit.conf: |
    [SERVICE]
        Flush 1
        Daemon Off
        Log_Level info
        Parsers_File /fluent-bit/etc/parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020

    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Tag kube.*
        Mem_Buf_Limit 50MB
        Skip_Long_Lines On

    [FILTER]
        Name kubernetes
        Match kube.*
        Kube_Tag_Prefix kube.var.log.containers.
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude Off

    {{- if .Values.config.namespaceFilter.enabled }}
    [FILTER]
        Name grep
        Match kube.*
        Regex $kubernetes['namespace_name'] {{ include "fluent-bit.namespaceRegex" . }}
    {{- end }}

    [FILTER]
        Name modify
        Match kube.*
        Add cluster_name {{ .Values.config.clusterName }}

    [OUTPUT]
        Name kafka
        Match kube.*
        Brokers {{ .Values.kafka.brokers }}
        Topics {{ .Values.kafka.topic }}
        Format {{ .Values.kafka.format }}
        Retry_Limit False
        rdkafka.request.required.acks {{ .Values.kafka.requiredAcks }}

  fluent-bit.local.conf: |
    [SERVICE]
        Flush 1
        Daemon Off
        Log_Level info
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Parsers_File /fluent-bit/etc/parsers.conf

    [INPUT]
        Name forward
        Listen {{ .Values.config.forward.listen }}
        Port {{ .Values.config.forward.port }}
        Tag {{ .Values.config.forward.tag }}

    [FILTER]
        Name modify
        Match *
        Rename log message

    [OUTPUT]
        Name kafka
        Match *
        Brokers {{ .Values.kafka.brokers }}
        Topics {{ .Values.kafka.topic }}
        Format {{ .Values.kafka.format }}
