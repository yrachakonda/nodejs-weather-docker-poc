[SERVICE]
    Flush 1
    Daemon Off
    Log_Level info
    HTTP_Server On
    HTTP_Listen 0.0.0.0
    HTTP_Port 2020
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name forward
    Listen 0.0.0.0
    Port 24224
    Tag weather-sim.*

[FILTER]
    Name modify
    Match *
    Rename log message

[OUTPUT]
    Name kafka
    Match *
    Brokers kafka:29092
    Topics weather-sim.logs
    Format json
