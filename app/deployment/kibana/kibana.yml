# Rendered by the Kibana chart via tpl from templates/configmap.yaml.
server.host: {{ .Values.kibana.serverHost | quote }}
server.publicBaseUrl: {{ .Values.kibana.publicBaseUrl | quote }}
elasticsearch.hosts:
{{- range .Values.elasticsearch.hosts }}
  - {{ . | quote }}
{{- end }}
telemetry.enabled: {{ .Values.kibana.telemetryEnabled }}
