apiVersion: v1
kind: Service
metadata:
  name: {{ include "logstash.headlessServiceName" . }}
  labels:
    {{- include "logstash.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{- include "logstash.selectorLabels" . | nindent 4 }}
