apiVersion: v1
kind: Service
metadata:
  name: {{ include "logstash.serviceName" . }}
  labels:
    {{- include "logstash.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{- include "logstash.selectorLabels" . | nindent 4 }}
