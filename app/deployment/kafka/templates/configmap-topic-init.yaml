apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kafka.topicInitName" . }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
data:
  topic-init.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    bootstrap_servers="{{ include "kafka.bootstrapAddress" . }}"
    kafka_bin_dir="${KAFKA_BIN_DIR:-/opt/kafka/bin}"

    until "${kafka_bin_dir}/kafka-topics.sh" --bootstrap-server "${bootstrap_servers}" --list >/dev/null 2>&1; do
      sleep 5
    done

    {{- range .Values.topicInit.topics }}
    "${kafka_bin_dir}/kafka-topics.sh" \
      --bootstrap-server "${bootstrap_servers}" \
      --create \
      --if-not-exists \
      --topic {{ .name | quote }} \
      --partitions {{ .partitions }} \
      --replication-factor {{ .replicationFactor }} \
      {{- range $key, $value := .config }}
      --config {{ $key }}={{ $value | quote }} \
      {{- end }}
      --config cleanup.policy=delete
    {{- end }}
