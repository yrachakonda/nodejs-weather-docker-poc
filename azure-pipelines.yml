trigger:
  branches:
    include:
      - main
  paths:
    include:
      - app/*
      - app/**
      - azure-pipelines.yml
      - pipelines/templates/*
      - pipelines/templates/**

variables:
  awsRegion: us-east-1
  apiRepositoryName: weather-sim-poc-api
  webRepositoryName: weather-sim-poc-web
  eksClusterName: weather-sim-poc
  kubernetesNamespace: weather-sim
  helmReleaseName: weather-sim
  helmValuesFile: app/deployment/weather-sim/charts/values-poc.yaml
  chartPath: app/deployment/weather-sim/charts
  appHost: weather-poc.example.com
  sessionSecretName: weather-sim-session-secret
  sessionSecretKey: SESSION_SECRET

stages:
  - stage: BuildAndTest
    displayName: Build and test application
    jobs:
      - template: pipelines/templates/build-test.yml
        parameters:
          appDirectory: app

  - stage: Containerize
    displayName: Build and push containers to ECR
    dependsOn: BuildAndTest
    jobs:
      - template: pipelines/templates/containerize.yml
        parameters:
          appDirectory: app
          awsRegion: $(awsRegion)
          apiRepositoryName: $(apiRepositoryName)
          webRepositoryName: $(webRepositoryName)

  - stage: DeployPOC
    displayName: Deploy application to EKS
    dependsOn: Containerize
    jobs:
      - template: pipelines/templates/deploy.yml
        parameters:
          awsRegion: $(awsRegion)
          eksClusterName: $(eksClusterName)
          kubernetesNamespace: $(kubernetesNamespace)
          helmReleaseName: $(helmReleaseName)
          chartPath: $(chartPath)
          helmValuesFile: $(helmValuesFile)
          apiRepositoryName: $(apiRepositoryName)
          webRepositoryName: $(webRepositoryName)
          appHost: $(appHost)
          sessionSecretName: $(sessionSecretName)
          sessionSecretKey: $(sessionSecretKey)
