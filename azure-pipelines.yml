trigger:
  branches:
    include: [ main ]

stages:
  - stage: BuildTest
    jobs:
      - job: build
        pool: { vmImage: ubuntu-latest }
        steps:
          - checkout: self
          - template: pipelines/templates/install.yml
          - script: |
              npm --prefix backend ci
              npm --prefix backend run build
              npm --prefix frontend ci
              npm --prefix frontend run build
            displayName: Build apps

  - stage: Docker
    dependsOn: BuildTest
    jobs:
      - job: docker
        steps:
          - script: |
              docker build -t $(ECR_API_REPO):$(Build.BuildId) backend
              docker build -t $(ECR_WEB_REPO):$(Build.BuildId) frontend
            displayName: Docker build

  - stage: Deploy
    dependsOn: Docker
    jobs:
      - job: helm_deploy
        steps:
          - script: |
              helm upgrade --install weather-sim ./helm/weather-sim \
                --set image.api=$(ECR_API_REPO) \
                --set image.web=$(ECR_WEB_REPO) \
                --set image.tag=$(Build.BuildId)
            displayName: Deploy via Helm

  - stage: Smoke
    dependsOn: Deploy
    jobs:
      - job: smoke
        steps:
          - script: curl -fsS https://$(APP_HOST)/api/v1/health/live
            displayName: Smoke live check

  - stage: DAST
    dependsOn: Smoke
    jobs:
      - job: zap
        steps:
          - script: |
              docker run --rm -t owasp/zap2docker-stable zap-baseline.py -t https://$(APP_HOST) -J zap.json
            displayName: ZAP baseline
      - job: rapid7
        steps:
          - script: echo "Invoke Rapid7 scan API with service connection"
            displayName: Rapid7 placeholder

  - stage: Gate
    dependsOn: DAST
    jobs:
      - job: quality_gate
        steps:
          - script: echo "Fail pipeline when DAST thresholds exceeded"
            displayName: Threshold gate
