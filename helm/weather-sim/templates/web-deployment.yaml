apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-sim-web
spec:
  replicas: 2
  selector:
    matchLabels: { app: weather-sim-web }
  template:
    metadata:
      labels: { app: weather-sim-web }
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.web }}:{{ .Values.image.tag }}"
          ports: [{ containerPort: 80 }]
