apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-sim-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-sim-api
  template:
    metadata:
      labels:
        app: weather-sim-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.api }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.apiPort }}
          envFrom:
            - configMapRef:
                name: weather-sim-config
          env:
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sessionSecretName }}
                  key: value
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redisUrlName }}
                  key: value
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: {{ .Values.service.apiPort }}
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: {{ .Values.service.apiPort }}
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:3.2
          env:
            - name: AWS_REGION
              value: {{ .Values.cloudWatch.region | quote }}
            - name: CLOUDWATCH_LOG_GROUP
              value: {{ .Values.cloudWatch.logGroup | quote }}
