apiVersion: v1
kind: ConfigMap
metadata:
  name: weather-sim-config
data:
  NODE_ENV: {{ .Values.env.NODE_ENV | quote }}
  APP_VERSION: {{ .Values.env.APP_VERSION | quote }}
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL | quote }}
  CORS_ORIGIN: {{ .Values.env.CORS_ORIGIN | quote }}
  SESSION_TTL_SECONDS: {{ .Values.env.SESSION_TTL_SECONDS | quote }}
  RATE_LIMIT_WINDOW_MS: {{ .Values.env.RATE_LIMIT_WINDOW_MS | quote }}
  RATE_LIMIT_MAX: {{ .Values.env.RATE_LIMIT_MAX | quote }}
  PORT: {{ .Values.service.apiPort | quote }}
