namespace: weather-sim
image:
  api: weather-sim-api
  web: weather-sim-web
  tag: latest
service:
  apiPort: 8080
  webPort: 80
ingress:
  enabled: true
  host: weather.local
env:
  NODE_ENV: production
  APP_VERSION: 1.0.0
  LOG_LEVEL: info
  CORS_ORIGIN: https://weather.local
  SESSION_TTL_SECONDS: "3600"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "100"
secrets:
  sessionSecretName: weather-sim-session
  redisUrlName: weather-sim-redis
cloudWatch:
  logGroup: /weather-sim/poc/app
  region: us-east-1
