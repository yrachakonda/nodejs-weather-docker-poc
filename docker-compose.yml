services:
  redis:
    image: redis:8.6.1
    ports: ["6379:6379"]
  api:
    build: ./backend
    environment:
      NODE_ENV: development
      API_PORT: 8080
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-long-random-value}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: debug
      APP_VERSION: 1.0.0
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 120
    ports: ["8080:8080"]
    depends_on: [redis]
  web:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
      VITE_API_KEY: ${DEFAULT_API_KEY:-poc-premium-key-001}
    ports: ["5173:80"]
    depends_on: [api]
  fluent-bit:
    image: fluent/fluent-bit:5.0.0-oauth2-rfc
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
    depends_on: [api]
