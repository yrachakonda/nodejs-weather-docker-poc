{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weather-sim
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: weather-sim-web, port: { number: 80 } }
          - path: /api
            pathType: Prefix
            backend:
              service: { name: weather-sim-api, port: { number: 8080 } }
{{- end }}
